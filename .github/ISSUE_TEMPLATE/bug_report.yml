name: Bug report
about: Report a reproducible problem in ProximityAuth
labels: [bug]
body:
  - type: textarea
    id: summary
    attributes:
      label: Summary
      description: What broke?
    validations:
      required: true
  - type: textarea
    id: steps
    attributes:
      label: Reproduction steps
      description: Include environment, platform, and logs.
    validations:
      required: true
