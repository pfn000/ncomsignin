<!doctype html>
<html>
  <head>
    <meta charset="utf-8" />
    <style>
      body { font-family: Arial, sans-serif; margin: 12px; min-width: 280px; }
      #state { font-weight: bold; }
      button, input { width: 100%; margin-top: 8px; padding: 8px; }
      .small { font-size: 12px; color: #555; }
    </style>
  </head>
  <body>
    <h3>Tap-N-Sign (TNS)</h3>
    <p>Daemon: <span id="state">Checking...</span></p>
    <input id="sessionId" placeholder="Paste verified session id" />
    <button id="verify">Verify Handshake</button>
    <button id="autofill">Autofill Current Login</button>
    <p id="updated" class="small"></p>
    <script src="popup.js"></script>
  </body>
</html>
